    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, owner_team, tags]
    description: Domain-driven design boundary with a specific language and model.

  Service:
    layer: architecture
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, owner_team, tags]
