entity_types:
  Source:
    layer: discovery
    status_profile: knowledge_record
    required_properties: [id, title, status, source_type]
    optional_properties: [summary, source_uri, collected_at, collector, review_status, tags]
    description: Canonical origin for collected information.

  Document:
    layer: discovery
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, source_uri, source_type, version, collected_at, collector, review_status, tags]
    description: A source artifact such as a report, pricing page snapshot, transcript, or repository file.

  Signal:
    layer: discovery
    status_profile: evidence_record
    required_properties: [id, title, status, signal_kind]
    optional_properties: [summary, confidence, review_status, source_uri, collected_at, collector, tags]
    description: Atomic observation extracted from a document or feed.

  Evidence:
    layer: evidence
    status_profile: evidence_record
    required_properties: [id, title, status]
    optional_properties: [summary, confidence, review_status, rationale, source_uri, collected_at, collector, tags]
    description: Normalized supporting material usable for reasoning and citation.

  Claim:
    layer: evidence
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, confidence, rationale, review_status, tags]
    description: Statement inferred from one or more evidence items.

  Assumption:
    layer: evidence
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, confidence, business_impact, user_impact, tags]
    description: Unproven but decision-relevant belief.

  Experiment:
    layer: evidence
    status_profile: experiment_record
    required_properties: [id, title, status, objective]
    optional_properties: [summary, hypothesis, metric_definition, target_value, owner, tags]
    description: Test designed to validate or invalidate an assumption or opportunity.

  Result:
    layer: evidence
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, confidence, current_value, rationale, tags]
    description: Outcome of an experiment, rollout, or analysis.

  Decision:
    layer: evidence
    status_profile: decision_record
    required_properties: [id, title, status, rationale]
    optional_properties: [summary, owner, priority, review_status, tags]
    description: Chosen direction with explicit rationale and supersession history.

  Driver:
    layer: motivation_strategy
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, business_impact, user_impact, priority, tags]
    description: Reason for change such as market pressure, customer pain, risk, or strategy.

  Assessment:
    layer: motivation_strategy
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, confidence, rationale, priority, tags]
    description: Interpreted view of the current state or implications of a driver.

  Goal:
    layer: motivation_strategy
    status_profile: change_record
    required_properties: [id, title, status]
    optional_properties: [summary, priority, target_value, owner_team, tags]
    description: Desired state to be achieved.

  Outcome:
    layer: motivation_strategy
    status_profile: change_record
    required_properties: [id, title, status]
    optional_properties: [summary, metric_definition, target_value, current_value, owner_team, tags]
    description: Measurable result for business or user value.

  Principle:
    layer: motivation_strategy
    status_profile: governance_record
    required_properties: [id, title, status]
    optional_properties: [summary, rationale, tags]
    description: Durable rule guiding decisions and solution choices.

  CourseOfAction:
    layer: motivation_strategy
    status_profile: change_record
    required_properties: [id, title, status]
    optional_properties: [summary, rationale, priority, tags]
    description: Strategic approach or plan adopted to pursue goals.

  ValueStream:
    layer: motivation_strategy
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, owner_team, tags]
    description: End-to-end flow that creates value for a stakeholder.

  Capability:
    layer: motivation_strategy
    status_profile: change_record
    required_properties: [id, title, status]
    optional_properties: [summary, priority, owner_team, tags]
    description: Ability the organization or product must possess.

  Market:
    layer: discovery
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, tags]
    description: Market or submarket classification.

  Segment:
    layer: discovery
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, priority, tags]
    description: Customer segment or ideal customer profile slice.

  Competitor:
    layer: discovery
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, source_uri, tags]
    description: Existing competing or substitute offering.

  Persona:
    layer: product_definition
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, tags]
    description: Modeled actor or user archetype.

  Job:
    layer: product_definition
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, user_impact, tags]
    description: JTBD-style customer job.

  Opportunity:
    layer: product_definition
    status_profile: change_record
    required_properties: [id, title, status]
    optional_properties: [summary, business_impact, user_impact, confidence, priority, tags]
    description: Valuable problem space worth pursuing.

  KPI:
    layer: product_definition
    status_profile: knowledge_record
    required_properties: [id, title, status, metric_definition]
    optional_properties: [summary, target_value, current_value, metric_kind, tags]
    description: Metric used to measure outcomes and progress.

  Feature:
    layer: product_definition
    status_profile: change_record
    required_properties: [id, title, status]
    optional_properties: [summary, priority, user_impact, tags]
    description: Customer-visible or operator-visible capability slice.

  Policy:
    layer: governance
    status_profile: governance_record
    required_properties: [id, title, status]
    optional_properties: [summary, rationale, data_classification, retention_policy, tags]
    description: Business, security, or operational rule.

  ReleaseGoal:
    layer: product_definition
    status_profile: change_record
    required_properties: [id, title, status]
    optional_properties: [summary, target_value, priority, tags]
    description: Goal for a particular release slice or milestone.

  Requirement:
    layer: requirements
    status_profile: requirement_record
    required_properties: [id, title, status, requirement_kind]
    optional_properties: [summary, rationale, priority, risk_level, tags]
    description: Testable expression of needed behavior or constraint.

  Constraint:
    layer: requirements
    status_profile: governance_record
    required_properties: [id, title, status]
    optional_properties: [summary, rationale, risk_level, tags]
    description: Limitation imposed by policy, technology, contracts, or regulation.

  AcceptanceCriterion:
    layer: requirements
    status_profile: requirement_record
    required_properties: [id, title, status]
    optional_properties: [summary, expression, tags]
    description: Concrete condition that must be satisfied for acceptance.

  Risk:
    layer: requirements
    status_profile: change_record
    required_properties: [id, title, status, risk_level]
    optional_properties: [summary, rationale, blast_radius, tags]
    description: Identified downside or uncertainty affecting decisions or implementation.

  BusinessService:
    layer: architecture
    status_profile: knowledge_record
    required_properties: [id, title, status, service_kind]
    optional_properties: [summary, owner_team, tags]
    description: Business-facing service exposed to stakeholders.

  ApplicationService:
