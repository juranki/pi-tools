  TestSuite:
    layer: delivery_migration
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, external_ref, tags]
    description: Collection of test cases.

  Agent:
    layer: delivery_migration
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, allowed_tools, required_permissions, tags]
