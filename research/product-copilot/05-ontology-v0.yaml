validation_rules:
  - id: VR-001
    description: Every Claim should be supported by at least one Evidence node.
    expression: "Claim <-[:SUPPORTS]- Evidence >= 1"

  - id: VR-002
    description: Every Goal should be influenced by a Driver or Assessment.
    expression: "Goal <-[:INFLUENCES]- (Driver|Assessment) >= 1"

  - id: VR-003
    description: Every Requirement should have at least one AcceptanceCriterion.
    expression: "Requirement -[:HAS_ACCEPTANCE]-> AcceptanceCriterion >= 1"

  - id: VR-004
    description: Every Requirement should trace to either a Goal or a Decision.
    expression: "Requirement <-[:DRIVES]- Goal OR Requirement <-[:CREATES]- Decision"

  - id: VR-005
    description: Every WorkPackage should implement at least one Requirement or address at least one Gap.
    expression: "WorkPackage -[:IMPLEMENTS]-> Requirement >= 1 OR WorkPackage <-[:ADDRESSED_BY]- Gap >= 1"

  - id: VR-006
    description: Every WorkPackage with autonomy above assistive must define acceptance checks and allowed tools.
    expression: "if WorkPackage.autonomy_level in [drafting, bounded_execution, managed_autonomy] then acceptance_checks != null and allowed_tools != null"

  - id: VR-007
    description: Every Deliverable should be produced by exactly one WorkPackage.
    expression: "Deliverable <-[:PRODUCES]- WorkPackage = 1"

  - id: VR-008
    description: Every Release should trace back to at least one Deliverable or Artifact.
    expression: "Release <-[:PRODUCES]- Artifact >= 1 OR Release <-[:DEPLOYED_AS]- Deployment >= 1"

  - id: VR-009
    description: Every Incident in reviewed state should have a Postmortem or explicit waiver.
    expression: "if Incident.status = reviewed then Incident <-[:ANALYZES]- Postmortem >= 1 OR Incident.tags contains 'postmortem-waived'"

  - id: VR-010
    description: Every production Deployment should run in an Environment tagged production.
    expression: "Deployment -[:RUNS_IN]-> Environment where Environment.environment_kind = production"
