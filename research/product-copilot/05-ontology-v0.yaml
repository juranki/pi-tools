  Event:
    layer: architecture
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, version, external_ref, tags]
    description: Domain or integration event definition.

  DataEntity:
    layer: architecture
    status_profile: knowledge_record
    required_properties: [id, title, status]
