ontology:
  id: product-copilot-v0
  version: 0.1.0
  title: Product Copilot Ontology
  description: >
    Machine-readable ontology for a graph-backed product copilot that traces
    market evidence through strategy, requirements, architecture, delivery,
    operations, and learning.
  modeling_style: labeled_property_graph
  status: draft
  principles:
    - preserve provenance for every important fact
    - separate evidence from inference and decision
    - keep strategy distinct from implementation detail
    - model target states, gaps, and migration work explicitly
    - make autonomous execution policy-carrying and verifiable

layers:
  - id: discovery
    description: Raw and normalized market, customer, competitor, and operational inputs.
  - id: evidence
    description: Claims, assumptions, experiments, and decisions grounded in evidence.
  - id: motivation_strategy
    description: Why change is needed and what outcomes, capabilities, and principles guide it.
  - id: product_definition
    description: Customer-facing framing of jobs, journeys, features, KPIs, and release goals.
  - id: requirements
    description: Testable expression of behavior, qualities, constraints, and risks.
  - id: architecture
    description: Structural allocation of requirements into services, components, interfaces, and environments.
  - id: delivery_migration
    description: Work decomposition, gaps, plateaus, deliverables, and execution control.
  - id: operations_learning
    description: Runtime behavior, incidents, telemetry, and learning loops.
  - id: governance
    description: Approval, compliance, control, and audit semantics.

