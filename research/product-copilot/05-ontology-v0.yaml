    description: Formal verification or approval activity.

  Gate:
    layer: delivery_migration
    status_profile: review_record
    required_properties: [id, title, status]
    optional_properties: [summary, expression, tags]
    description: Binary or graded quality gate used before progression.

  Release:
    layer: operations_learning
    status_profile: release_record
    required_properties: [id, title, status]
    optional_properties: [summary, version, owner_team, tags]
    description: Deployable product state.

  Deployment:
    layer: operations_learning
    status_profile: change_record
    required_properties: [id, title, status]
    optional_properties: [summary, external_ref, owner_team, tags]
    description: Realized deployment of a release into an environment.

  Metric:
    layer: operations_learning
    status_profile: knowledge_record
    required_properties: [id, title, status, metric_kind, metric_definition]
    optional_properties: [summary, formula, current_value, tags]
    description: Measurable indicator used in product, engineering, reliability, security, or cost analysis.

  SLI:
    layer: operations_learning
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, expression, current_value, tags]
    description: Service level indicator derived from one or more metrics.

  SLO:
    layer: operations_learning
    status_profile: governance_record
    required_properties: [id, title, status, target_value]
    optional_properties: [summary, threshold, rationale, tags]
    description: Target for service level performance.

  Alert:
    layer: operations_learning
    status_profile: change_record
    required_properties: [id, title, status, threshold]
    optional_properties: [summary, priority, tags]
    description: Operational alert definition.

  Incident:
    layer: operations_learning
    status_profile: incident_record
    required_properties: [id, title, status, risk_level]
    optional_properties: [summary, blast_radius, owner_team, tags]
    description: Service-impacting event or degradation.

  Runbook:
    layer: operations_learning
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, external_ref, version, tags]
    description: Procedural guidance for operations and recovery.

  CostItem:
    layer: operations_learning
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, current_value, owner_team, tags]
    description: Cost allocation or unit economics line item.

  Postmortem:
    layer: operations_learning
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, rationale, owner_team, tags]
    description: Structured analysis of an incident or failure.

  ApprovalPolicy:
    layer: governance
    status_profile: governance_record
    required_properties: [id, title, status]
    optional_properties: [summary, rationale, expression, tags]
    description: Rule that determines when human or automated approval is required.

  ComplianceRequirement:
    layer: governance
    status_profile: governance_record
    required_properties: [id, title, status]
    optional_properties: [summary, rationale, source_uri, tags]
    description: External or internal compliance obligation.

  Control:
    layer: governance
    status_profile: governance_record
    required_properties: [id, title, status]
    optional_properties: [summary, rationale, expression, tags]
    description: Verifiable control applied to work, code, systems, or operations.

  AuditRecord:
    layer: governance
    status_profile: knowledge_record
    required_properties: [id, title, status]
    optional_properties: [summary, source_uri, collected_at, collector, tags]
    description: Auditable trace of a decision, action, review, or release event.

edge_types:
  CONTAINS:
    allowed_from: [Source, TestSuite]
    allowed_to: [Document, TestCase]
    description: Parent container relationship.

  YIELDS:
    allowed_from: [Document]
    allowed_to: [Signal]
    description: Extracted observation from a document.

  SUPPORTS:
    allowed_from: [Signal, Evidence]
    allowed_to: [Evidence, Claim]
    description: Positive evidentiary support.

  CONTRADICTS:
    allowed_from: [Evidence]
    allowed_to: [Claim]
    description: Negative evidentiary relationship.

  INFORMS:
    allowed_from: [Signal]
    allowed_to: [Assessment]
    description: Raw signal informing an assessment.

  BASED_ON:
    allowed_from: [Assessment, Decision, ADR]
    allowed_to: [Evidence, Claim, Assumption]
    description: Reasoning grounded in supporting material.

  TESTED_BY:
    allowed_from: [Assumption]
    allowed_to: [Experiment]
    description: Assumption validated through experiment.

  PRODUCES:
