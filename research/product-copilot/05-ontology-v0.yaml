property_schema:
  id:
    type: string
    required: true
    description: Globally unique stable identifier.
  title:
    type: string
    required: true
    description: Human-readable short label.
  summary:
    type: text
    required: false
    description: Concise description or normalized abstract.
  status:
    type: string
    required: true
    description: Status constrained by the entity type's status_profile.
  owner:
    type: string
    required: false
    description: Responsible person, team, or agent.
  tags:
    type: list[string]
    required: false
    description: Free-form classification tags.
  created_at:
    type: datetime
    required: false
  updated_at:
    type: datetime
    required: false
  source_uri:
    type: string
    required: false
    description: URI or canonical locator of origin.
  source_type:
    type: string
    required: false
    description: Internal, web, analyst_report, support_ticket, repo, telemetry, and so on.
  collected_at:
    type: datetime
    required: false
  collector:
    type: string
    required: false
    description: Agent or human that collected the record.
  extraction_method:
    type: string
    required: false
    description: Manual, parser, scraper, LLM extraction, ETL job, and so on.
  confidence:
    type: confidence_level
    required: false
  review_status:
    type: review_status
    required: false
  version:
    type: string
    required: false
  external_ref:
    type: string
    required: false
